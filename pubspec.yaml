name: flutter_starter_workspace
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dev_dependencies:
  melos: ^7.7.0

workspace:
  - packages/core
  - packages/features_shared
  - apps/manahpro
  - apps/variant

melos:
  packages:
    - apps/**
    - packages/**
  scripts:
    dev:
      run: cd apps/manahpro && flutter run --dart-define=ENV=dev
      description: Run the manahpro app in dev environment.

    "dev:variant":
      run: cd apps/variant && flutter run --dart-define=ENV=dev
      description: Run the variant app in dev environment.

    l10n:
      run: cd packages/core && flutter gen-l10n
      description: Generate localization files for the core package.

    codegen:
      run: dart run build_runner build --delete-conflicting-outputs
      description: Run code generation (Riverpod, Drift, etc.) for all packages
      packageFilters:
        dependsOn: build_runner

    postbootstrap:
      run: melos run l10n && melos run codegen
      description: Auto-generate l10n and run codegen after bootstrap

    analyze:
      run: dart analyze packages/core packages/features_shared apps/manahpro apps/variant
      description: Analyze all packages and apps.

    format:
      run: dart format --line-length=80 packages apps
      description: Format all Dart files (excludes bricks/ which contains Mason templates).

    "format:check":
      run: dart format --output=none --set-exit-if-changed packages apps
      description: Check Dart formatting without changing files.

    build:android:
      run: cd apps/manahpro && flutter build apk --dart-define=ENV=prod && cd ../variant && flutter build apk --dart-define=ENV=prod
      description: Build Android APKs for all apps.

    "build:android:manahpro":
      run: cd apps/manahpro && flutter build apk --dart-define=ENV=prod
      description: Build Android APK for the manahpro app.

    "build:android:variant":
      run: cd apps/variant && flutter build apk --dart-define=ENV=prod
      description: Build Android APK for the variant app.

    build:ios:
      run: cd apps/manahpro && flutter build ipa --dart-define=ENV=prod && cd ../variant && flutter build ipa --dart-define=ENV=prod
      description: Build iOS IPAs for all apps.

    "build:ios:manahpro":
      run: cd apps/manahpro && flutter build ipa --dart-define=ENV=prod
      description: Build iOS IPA for the manahpro app.

    "build:ios:variant":
      run: cd apps/variant && flutter build ipa --dart-define=ENV=prod
      description: Build iOS IPA for the variant app.

    build:web:
      run: cd apps/manahpro && flutter build web --dart-define=ENV=prod && cd ../variant && flutter build web --dart-define=ENV=prod
      description: Build web output for all apps.

    "build:web:manahpro":
      run: cd apps/manahpro && flutter build web --dart-define=ENV=prod
      description: Build web output for the manahpro app.

    "build:web:variant":
      run: cd apps/variant && flutter build web --dart-define=ENV=prod
      description: Build web output for the variant app.

    test:
      run: flutter test apps/manahpro/test apps/variant/test packages/core/test packages/features_shared/test
      description: Run tests for all packages and apps.

    "test:core":
      run: flutter test packages/core/test
      description: Run tests for the core package.

    "test:features_shared":
      run: flutter test packages/features_shared/test
      description: Run tests for the features_shared package.

    "test:manahpro":
      run: flutter test apps/manahpro/test
      description: Run tests for the manahpro app.

    "test:variant":
      run: flutter test apps/variant/test
      description: Run tests for the variant app.

    make-feature:
      run: mason make feature --output-dir packages/features_shared/lib/src/
      description: Generate a new Clean Architecture feature with Mason
