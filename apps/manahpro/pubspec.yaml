name: manahpro
description: "Starter Main — ManahPro flavor."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  core:
  features_shared:
  firebase_core: ^3.15.2
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  equatable: ^2.0.7
  dio: ^5.9.2
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  package_info_plus: ^10.1.0
  fl_chart: ^1.1.1
  path_provider: ^2.1.5
  share_plus: ^13.0.0
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  image_picker: ^1.1.2



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  drift_dev: ^2.33.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/
