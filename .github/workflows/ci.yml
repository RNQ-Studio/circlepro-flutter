name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze, Format, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: dart pub get

      - name: List workspace packages
        run: dart run melos list

      - name: Check formatting
        run: dart run melos run format:check

      - name: Analyze
        run: dart run melos run analyze

      - name: Test
        run: dart run melos run test
